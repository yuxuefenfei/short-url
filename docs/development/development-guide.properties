# 短网址管理系统开发速查配置
# 格式: key=value

# ==================== 项目基本信息 ====================
project.name=短网址管理系统
project.version=1.0.0
project.encoding=UTF-8

# ==================== 技术栈 ====================
backend.framework=Spring Boot 3.x
backend.orm=MyBatis-Flex
backend.database=MySQL 8.x
backend.cache=Redis 6.x
backend.security=Spring Security + JWT
backend.build=Maven

frontend.framework=Vue 3
frontend.build=Vite
frontend.state=Pinia
frontend.ui=Ant Design Vue
frontend.chart=ECharts

# ==================== 开发环境 ====================
dev.java.version=17
dev.node.version=18+
dev.mysql.version=8.0+
dev.redis.version=6.2+

# ==================== 服务端口 ====================
backend.server.port=8080
frontend.dev.port=5173

# ==================== 数据库配置 ====================
db.host=localhost
db.port=3306
db.name=short_url_db
db.charset=utf8mb4
db.collation=utf8mb4_unicode_ci

# ==================== Redis 配置 ====================
redis.host=localhost
redis.port=6379
redis.database=0

# ==================== JWT 配置 ====================
jwt.expiration.ms=86400000
jwt.token.prefix=Bearer

# ==================== 短链配置 ====================
shorturl.default.domain=http://localhost:8080
shorturl.default.key.length=6

# ==================== 接口统一返回格式 ====================
api.response.success.code=200
api.response.success.message=success
api.response.wrapper=ApiResponse<T>
api.response.page.wrapper=ApiResponse<PageResult<T>>
api.response.fields=code,message,data,timestamp,requestId
api.page.fields=list,total,page,size,totalPages

# ==================== 核心公开 API ====================
api.public.create_short_url=POST /api/shorten
api.public.get_stats=GET /api/stats/{shortKey}
api.public.redirect=GET /{shortKey}

# ==================== 管理端 API ====================
api.admin.login=POST /api/auth/login
api.admin.refresh_token=POST /api/auth/refresh-token
api.admin.users.list=GET /api/admin/users
api.admin.users.status=PUT /api/admin/users/{id}/status
api.admin.urls.list=GET /api/admin/urls
api.admin.urls.status=PUT /api/admin/urls/{id}/status
api.admin.urls.delete=DELETE /api/admin/urls/{id}
api.admin.logs.list=GET /api/admin/operation-logs
api.admin.logs.stats=GET /api/admin/operation-logs/stats
api.admin.dashboard.overview=GET /api/admin/dashboard/overview

# ==================== 常用命令 ====================
command.backend.run=mvn spring-boot:run
command.backend.test=mvn test
command.backend.build=mvn -DskipTests package
command.frontend.install=npm install
command.frontend.dev=npm run dev
command.frontend.build=npm run build

# ==================== 文档入口 ====================
doc.readme=README.md
doc.api_spec=docs/api/api-spec.yaml
doc.response_format=docs/api/response-format.md
doc.database_dict=docs/database/data-dictionary.md
doc.database_schema=docs/database/schema.sql
