# 短网址管理系统 - 开发指南
# 格式: key=value (Java Properties格式)

# ==================== 项目基本信息 ====================
project.name=短网址管理系统
project.version=1.0.0
project.status=核心功能已完成
completion.date=2026-03-03
development.period=2天

# ==================== 技术栈配置 ====================
# 后端技术
backend.framework=Spring Boot 3.x
backend.orm=MyBatis-Flex
backend.database=MySQL 8.x
backend.cache=Redis 6.x
backend.security=Spring Security + JWT
backend.build=Maven

# 前端技术
frontend.framework=Vue 3
frontend.build=Vite
frontend.state=Pinia
frontend.ui=Ant Design Vue
frontend.charts=ECharts

# ==================== 环境配置 ====================
# 开发环境
dev.java.version=17
dev.node.version=18+
dev.mysql.version=8.0+
dev.redis.version=6.2+

# 生产环境
prod.java.version=17
prod.server.port=8080
prod.server.host=0.0.0.0

# ==================== 数据库配置 ====================
db.host=localhost
db.port=3306
db.name=short_url_db
db.username=root
db.password=your_password
db.charset=utf8mb4
db.collation=utf8mb4_unicode_ci

# ==================== Redis配置 ====================
redis.host=localhost
redis.port=6379
redis.database=0
redis.password=
redis.timeout=3000ms

# ==================== JWT配置 ====================
jwt.secret=your_jwt_secret_key_here
jwt.expiration=86400000
jwt.issuer=short-url-system

# ==================== 短网址配置 ====================
shorturl.domain=https://short.ly
shorturl.key.length=6
shorturl.cache.expire.days=7
shorturl.algorithm=base62

# ==================== 文件路径配置 ====================
# 后端路径
backend.src.main=src/main/java/com/example/shorturl/
backend.src.resources=src/main/resources/
backend.config.file=application.yml

# 前端路径
frontend.src=src/
frontend.components=components/
frontend.pages=pages/
frontend.stores=stores/
frontend.utils=utils/
frontend.api=api/

# ==================== API端点 ====================
api.base.url=/api
api.shorten=/shorten
api.stats=/stats/{shortKey}
api.admin.login=/auth/login
api.admin.users=/admin/users
api.admin.urls=/admin/urls
api.admin.logs=/admin/operation-logs

# ==================== 错误码定义 ====================
error.success=200
error.bad_request=400
error.unauthorized=401
error.forbidden=403
error.not_found=404
error.business_start=4001
error.business_end=4999

# 业务错误码
error.invalid_url=4001
error.url_not_exist=4004
error.user_not_exist=4007
error.password_error=4008

# ==================== 性能目标 ====================
performance.response_time.target=100
performance.response_time.unit=ms
performance.qps.target=1000
performance.cache.hit.rate=90
performance.availability=99.9

# ==================== 安全配置 ====================
security.password.encoder=bcrypt
security.token.type=jwt
security.sql.injection.protection=true
security.xss.protection=true
security.csrf.protection=true

# ==================== 开发命令 ====================
# 后端命令
command.backend.run=mvn spring-boot:run
command.backend.build=mvn clean package
command.backend.test=mvn test
command.backend.install=mvn clean install

# 前端命令
command.frontend.install=npm install
command.frontend.dev=npm run dev
command.frontend.build=npm run build
command.frontend.preview=npm run preview
command.frontend.lint=npm run lint

# ==================== 数据库表结构 ====================
# short_url_mapping表
table.short_url_mapping.id=id (PK, AUTO_INCREMENT)
table.short_url_mapping.short_key=short_key (UNIQUE INDEX)
table.short_url_mapping.original_url=original_url
table.short_url_mapping.title=title
table.short_url_mapping.click_count=click_count
table.short_url_mapping.status=status
table.short_url_mapping.created_time=created_time
table.short_url_mapping.expired_time=expired_time

# url_access_log表
table.url_access_log.id=id (PK, AUTO_INCREMENT)
table.url_access_log.short_key=short_key (INDEX)
table.url_access_log.user_agent=user_agent
table.url_access_log.ip_address=ip_address
table.url_access_log.access_time=access_time (INDEX)

# user表
table.user.id=id (PK, AUTO_INCREMENT)
table.user.username=username (UNIQUE INDEX)
table.user.password=password
table.user.email=email
table.user.role=role
table.user.status=status
table.user.last_login_time=last_login_time
table.user.created_time=created_time

# ==================== 已完成功能标记 ====================
feature.backend.core=true
feature.backend.entities=true
feature.backend.services=true
feature.backend.controllers=true
feature.backend.utils=true
feature.backend.exceptions=true

feature.frontend.core=true
feature.frontend.pages=true
feature.frontend.stores=true
feature.frontend.utils=true
feature.frontend.components=true

feature.api.shorten=true
feature.api.stats=true
feature.api.redirect=true

# ==================== 待开发功能标记 ====================
feature.todo.user_auth=true
feature.todo.admin_dashboard=true
feature.todo.operation_logs=true
feature.todo.security_enhancement=true
feature.todo.performance_optimization=true
feature.todo.testing=false
feature.todo.deployment=false

# ==================== 开发阶段 ====================
phase.current=核心功能和管理系统开发完成
phase.next=测试和部署优化
phase.timeline.planning=已完成
phase.timeline.core_development=已完成
phase.timeline.user_system=已完成
phase.timeline.admin_system=已完成
phase.timeline.testing=待开始
phase.timeline.deployment=待开始

# ==================== 代码质量要求 ====================
quality.test.coverage.min=80
quality.code.review.required=true
quality.documentation.required=true
quality.security.scan.required=true

# ==================== 部署配置 ====================
deployment.type=manual
deployment.stages=dev,prod
deployment.ci_cd=none
deployment.monitoring=none

# ==================== 监控配置 ====================
monitoring.logs.level=INFO
monitoring.logs.file=logs/short-url.log
monitoring.metrics.enabled=true
monitoring.health.check.enabled=true

# ==================== 备份策略 ====================
backup.database.schedule=daily
backup.database.retention=30days
backup.logs.schedule=weekly
backup.logs.retention=90days

# ==================== 开发规范 ====================
coding.standard=阿里巴巴Java开发手册
coding.indentation=4 spaces
coding.line.length.max=120
coding.file.encoding=UTF-8

# ==================== 版本控制 ====================
git.branch.main=main
git.branch.develop=develop
git.branch.feature.prefix=feature/
git.branch.hotfix.prefix=hotfix/

# ==================== 文档要求 ====================
documentation.api.required=true
documentation.user_guide.required=true
documentation.deployment.required=true
documentation.troubleshooting.required=true

# ==================== 成功标准 ====================
success.functional.core=true
success.functional.user_system=true
success.functional.admin_system=true
success.performance.response_time=true
success.security.basic=true
success.security.enhanced=true
success.documentation.basic=true
success.documentation.comprehensive=true