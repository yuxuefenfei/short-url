openapi: 3.0.3
info:
  title: 短网址管理系统 API
  description: 短网址生成和管理系统的RESTful API接口文档
  version: 1.0.0
  contact:
    name: 开发团队
    email: dev@example.com
    url: https://short.ly

servers:
  - url: http://localhost:8080
    description: 开发环境
  - url: https://api.short.ly
    description: 生产环境

security:
  - bearerAuth: []

tags:
  - name: 短网址
    description: 短网址生成和管理
  - name: 用户认证
    description: 用户注册、登录和认证
  - name: 管理后台
    description: 管理后台相关接口
  - name: 操作日志
    description: 操作日志查询和管理
  - name: 健康检查
    description: 系统健康状态检查
  - name: 重定向
    description: 短网址重定向服务

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # 通用响应格式
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应状态码
          example: 200
        message:
          type: string
          description: 响应消息
          example: "操作成功"
        data:
          type: object
          description: 响应数据
        timestamp:
          type: string
          format: date-time
          description: 响应时间
          example: "2024-01-01T10:00:00Z"
        requestId:
          type: string
          description: 请求ID
          example: "req_abc123"

    # 错误响应示例
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          example: 4001
        message:
          type: string
          example: "请求参数错误"
        data:
          type: object
          nullable: true
        timestamp:
          type: string
          example: "2024-01-01T10:00:00Z"
        requestId:
          type: string
          example: "req_abc123"

    # 短网址请求模型
    ShortUrlRequest:
      type: object
      required:
        - originalUrl
      properties:
        originalUrl:
          type: string
          format: uri
          description: 原始长网址
          example: "https://example.com/very/long/url"
        title:
          type: string
          description: 网址标题（可选）
          example: "示例网址"
        expiredTime:
          type: string
          format: date-time
          description: 过期时间（可选，表示永不过期）
          example: "2024-12-31T23:59:59Z"

    # 短网址响应模型
    ShortUrlResponse:
      type: object
      properties:
        shortUrl:
          type: string
          description: 完整的短网址
          example: "https://short.ly/abc123"
        shortKey:
          type: string
          description: 短网址key
          example: "abc123"
        originalUrl:
          type: string
          description: 原始网址
          example: "https://example.com/very/long/url"
        title:
          type: string
          description: 网址标题
          example: "示例网址"
        createdTime:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-01-01T10:00:00Z"

    # 统计信息响应模型
    StatsResponse:
      type: object
      properties:
        totalClicks:
          type: integer
          description: 总点击次数
          example: 1234
        todayClicks:
          type: integer
          description: 今日点击次数
          example: 56
        createdTime:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-01-01T10:00:00Z"
        lastAccessTime:
          type: string
          format: date-time
          description: 最后访问时间
          example: "2024-01-15T14:30:00Z"

    # 用户登录请求
    UserLoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
          example: "admin"
        password:
          type: string
          description: 密码
          example: "password123"

    # 用户注册请求
    UserRegisterRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
          example: "newuser"
        password:
          type: string
          description: 密码
          example: "password123"
        email:
          type: string
          format: email
          description: 邮箱（可选）
          example: "user@example.com"

    # 用户信息模型
    UserInfo:
      type: object
      properties:
        id:
          type: integer
          description: 用户ID
          example: 1
        username:
          type: string
          description: 用户名
          example: "admin"
        email:
          type: string
          description: 邮箱
          example: "admin@example.com"
        role:
          type: string
          description: 角色
          example: "ADMIN"
        status:
          type: integer
          description: 状态 (1:正常, 0:禁用)
          example: 1
        createdTime:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-01-01T10:00:00Z"

    # 分页响应模型
    PageResult:
      type: object
      properties:
        records:
          type: array
          items:
            type: object
          description: 数据记录
        total:
          type: integer
          description: 总记录数
          example: 100
        size:
          type: integer
          description: 每页大小
          example: 20
        current:
          type: integer
          description: 当前页码
          example: 1

    # 系统统计模型
    SystemStats:
      type: object
      properties:
        totalUrls:
          type: integer
          description: 总短网址数量
          example: 1000
        totalClicks:
          type: integer
          description: 总点击次数
          example: 50000
        todayUrls:
          type: integer
          description: 今日新增短网址
          example: 50
        todayClicks:
          type: integer
          description: 今日点击次数
          example: 1200
        totalUsers:
          type: integer
          description: 总用户数
          example: 100
        activeUsers:
          type: integer
          description: 活跃用户数
          example: 80

paths:
  # ============================================
  # 短网址相关接口
  # ============================================
  /api/shorten:
    post:
      tags:
        - 短网址
      summary: 生成短网址
      description: 将长网址转换为短网址
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortUrlRequest'
      responses:
        '200':
          description: 短网址生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
              example:
                $ref: '#/components/schemas/ErrorResponse'

  /api/stats/{shortKey}:
    get:
      tags:
        - 短网址
      summary: 获取短网址统计信息
      description: 查询指定短网址的访问统计信息
      parameters:
        - name: shortKey
          in: path
          required: true
          schema:
            type: string
          description: 短网址key
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: 短网址不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================
  # 用户认证相关接口
  # ============================================
  /api/auth/login:
    post:
      tags:
        - 用户认证
      summary: 用户登录
      description: 用户登录获取访问令牌
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: 用户名
        - name: password
          in: query
          required: true
          schema:
            type: string
          description: 密码
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 用户名或密码错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/register:
    post:
      tags:
        - 用户认证
      summary: 用户注册
      description: 注册新用户账户
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
          description: 用户名
        - name: password
          in: query
          required: true
          schema:
            type: string
          description: 密码
        - name: email
          in: query
          required: false
          schema:
            type: string
          description: 邮箱（可选）
      responses:
        '200':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '400':
          description: 用户名已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/refresh-token:
    post:
      tags:
        - 用户认证
      summary: 刷新访问令牌
      description: 使用刷新令牌获取新的访问令牌
      parameters:
        - name: Refresh-Token
          in: header
          required: true
          schema:
            type: string
          description: 刷新令牌
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: 刷新令牌无效或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/logout:
    post:
      tags:
        - 用户认证
      summary: 用户登出
      description: 用户登出并清除令牌
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer Token
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/validate-token:
    get:
      tags:
        - 用户认证
      summary: 验证令牌有效性
      description: 验证访问令牌是否有效
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer Token
      responses:
        '200':
          description: 验证成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/auth/current-user:
    get:
      tags:
        - 用户认证
      summary: 获取当前用户信息
      description: 获取当前登录用户的信息
      security:
        - bearerAuth: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer Token
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================
  # 用户管理接口
  # ============================================
  /api/admin/users:
    get:
      tags:
        - 管理后台
      summary: 获取用户列表
      description: 分页获取用户列表，支持搜索和筛选
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: 页码
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 每页大小
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 搜索关键词
        - name: status
          in: query
          required: false
          schema:
            type: integer
          description: 用户状态 (0:禁用, 1:正常)
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/users/{userId}:
    get:
      tags:
        - 管理后台
      summary: 获取用户详情
      description: 获取指定用户的详细信息
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    put:
      tags:
        - 管理后台
      summary: 更新用户信息
      description: 更新指定用户的信息
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                role:
                  type: string
                  enum: [USER, ADMIN]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    delete:
      tags:
        - 管理后台
      summary: 删除用户
      description: 删除指定用户（软删除）
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/users/{userId}/status:
    put:
      tags:
        - 管理后台
      summary: 更新用户状态
      description: 启用或禁用指定用户
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: 用户ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  enum: [0, 1]
                  description: 用户状态 (0:禁用, 1:正常)
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================
  # 短网址管理接口
  # ============================================
  /api/admin/urls:
    get:
      tags:
        - 管理后台
      summary: 获取短网址列表
      description: 分页获取短网址列表，支持搜索和筛选
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: 页码
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 每页大小
        - name: keyword
          in: query
          required: false
          schema:
            type: string
          description: 搜索关键词
        - name: status
          in: query
          required: false
          schema:
            type: integer
          description: 短网址状态 (0:禁用, 1:正常)
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/urls/{id}:
    get:
      tags:
        - 管理后台
      summary: 获取短网址详情
      description: 获取指定短网址的详细信息
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 短网址ID
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    put:
      tags:
        - 管理后台
      summary: 更新短网址信息
      description: 更新指定短网址的信息
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 短网址ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                status:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

    delete:
      tags:
        - 管理后台
      summary: 删除短网址
      description: 删除指定短网址
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 短网址ID
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/urls/{id}/status:
    put:
      tags:
        - 管理后台
      summary: 更新短网址状态
      description: 启用或禁用指定短网址
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 短网址ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  enum: [0, 1]
                  description: 短网址状态 (0:禁用, 1:正常)
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/urls/batch-status:
    put:
      tags:
        - 管理后台
      summary: 批量更新短网址状态
      description: 批量启用或禁用短网址
      security:
        - bearerAuth: []
      parameters:
        - name: ids
          in: query
          required: true
          schema:
            type: array
            items:
              type: integer
          description: 短网址ID列表
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: integer
                  enum: [0, 1]
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/urls/batch:
    delete:
      tags:
        - 管理后台
      summary: 批量删除短网址
      description: 批量删除指定的短网址
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/urls/{shortKey}/stats:
    get:
      tags:
        - 管理后台
      summary: 获取短网址统计详情
      description: 获取指定短网址的详细统计信息
      security:
        - bearerAuth: []
      parameters:
        - name: shortKey
          in: path
          required: true
          schema:
            type: string
          description: 短网址key
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ============================================
  # 系统管理接口
  # ============================================
  /api/admin/system-stats:
    get:
      tags:
        - 管理后台
      summary: 获取系统统计信息
      description: 获取系统的整体统计数据
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/operation-logs:
    get:
      tags:
        - 操作日志
      summary: 获取操作日志列表
      description: 分页获取操作日志，支持按用户、操作类型筛选
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            default: 1
          description: 页码
        - name: size
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: 每页大小
        - name: userId
          in: query
          required: false
          schema:
            type: integer
          description: 用户ID筛选
        - name: operation
          in: query
          required: false
          schema:
            type: string
          description: 操作类型筛选
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: 开始时间
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: 结束时间
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /api/admin/operation-logs/export:
    get:
      tags:
        - 操作日志
      summary: 导出操作日志
      description: 导出操作日志为CSV或Excel格式
      security:
        - bearerAuth: []
      parameters:
        - name: format
          in: query
          required: false
          schema:
            type: string
            enum: [csv, excel]
            default: csv
          description: 导出格式
        - name: startDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: 开始时间
        - name: endDate
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: 结束时间
      responses:
        '200':
          description: 导出成功
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  # ============================================
  # 健康检查接口
  # ============================================
  /health:
    get:
      tags:
        - 健康检查
      summary: 基础健康检查
      description: 检查应用是否正常运行
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /health/detailed:
    get:
      tags:
        - 健康检查
      summary: 详细健康检查
      description: 检查应用及其依赖服务的健康状态
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /health/liveness:
    get:
      tags:
        - 健康检查
      summary: 存活检查
      description: 检查应用是否存活
      responses:
        '200':
          description: 应用存活
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Application is alive"
                  data:
                    type: string
                    example: "alive"

  /health/readiness:
    get:
      tags:
        - 健康检查
      summary: 就绪检查
      description: 检查应用是否准备好接收流量
      responses:
        '200':
          description: 应用就绪
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                    example: 200
                  message:
                    type: string
                    example: "Application is ready"
                  data:
                    type: string
                    example: "ready"

  # ============================================
  # 重定向接口
  # ============================================
  /{shortKey}:
    get:
      tags:
        - 重定向
      summary: 短网址重定向
      description: 访问短网址并重定向到原始URL
      parameters:
        - name: shortKey
          in: path
          required: true
          schema:
            type: string
            pattern: '^[\\w]+$'
          description: 短网址key
      responses:
        '302':
          description: 重定向到原始URL
          headers:
            Location:
              schema:
                type: string
                description: 原始URL
        '404':
          description: 短网址不存在或已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '410':
          description: 短网址已过期
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'