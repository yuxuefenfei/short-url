<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短网址管理系统</title>

    <!-- 页面描述 -->
    <meta name="description" content="短网址生成和管理系统，支持访问统计和分析">
    <meta name="keywords" content="短网址,URL缩短,访问统计,链接管理">

    <!-- 预加载关键资源 -->
    <link rel="preload" as="style" href="/src/assets/styles/global.css">

    <!-- 移动端适配 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        /* 加载动画样式 */
        .app-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #1890ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loading-text {
            margin-top: 16px;
            color: #666;
            font-size: 14px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 应用加载动画 -->
        <div class="app-loading">
            <div class="loading-spinner"></div>
            <div class="loading-text">短网址管理系统加载中...</div>
        </div>
    </div>

    <!-- Vite HMR客户端 -->
    <script type="module" src="/src/main.js"></script>

    <!-- PWA支持（可选） -->
    <!-- <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script> -->
</body>
</html>
